<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AI Startup War Simulator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        background: #0a0f1a;
        min-height: 100vh;
      }

      #canvas-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        display: block;
      }

      .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(0, 40, 50, 0.3) 0%,
          rgba(5, 15, 25, 0.85) 100%
        );
        z-index: -1;
      }

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        backdrop-filter: blur(20px);
        background: rgba(8, 20, 28, 0.7);
        border-bottom: 1px solid rgba(72, 187, 120, 0.4);
        padding: 1rem 0;
      }

      .nav-container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .logo-icon {
        font-size: 2rem;
        background: linear-gradient(135deg, #48bb78, #38b2ac);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .logo-text {
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff, #48bb78);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem 2rem;
      }

      .auth-card {
        background: rgba(15, 35, 35, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        border: 1px solid rgba(72, 187, 120, 0.4);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-header h2 {
        font-size: 2rem;
        background: linear-gradient(135deg, #fff, #48bb78);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
      }

      .auth-header p {
        color: #a0aec0;
        font-size: 0.9rem;
      }

      .input-group {
        margin-bottom: 1.2rem;
      }

      .input-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #cbd5e0;
        font-size: 0.9rem;
      }

      .input-group input {
        width: 100%;
        padding: 1rem;
        background: rgba(30, 50, 55, 0.8);
        border: 1px solid rgba(72, 187, 120, 0.3);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        outline: none;
        transition: 0.2s;
      }

      .input-group input:focus {
        border-color: #48bb78;
        box-shadow: 0 0 12px rgba(72, 187, 120, 0.3);
      }

      .checkbox-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .checkbox-group label {
        color: #a0aec0;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .forgot-link {
        color: #48bb78;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .auth-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #48bb78, #38b2ac);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }

      .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3);
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: #a0aec0;
      }

      .auth-footer a {
        color: #48bb78;
        text-decoration: none;
        font-weight: 600;
      }

      .social-login {
        margin-top: 2rem;
        text-align: center;
      }

      .social-login p {
        color: #a0aec0;
        margin-bottom: 1rem;
        position: relative;
      }

      .social-login p::before,
      .social-login p::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 30%;
        height: 1px;
        background: rgba(72, 187, 120, 0.3);
      }

      .social-login p::before {
        left: 0;
      }

      .social-login p::after {
        right: 0;
      }

      .social-icons {
        display: flex;
        justify-content: center;
        gap: 1rem;
      }

      .social-icon {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        background: rgba(72, 187, 120, 0.1);
        border: 1px solid rgba(72, 187, 120, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #48bb78;
        font-size: 1.2rem;
        transition: 0.3s;
        cursor: pointer;
      }

      .social-icon:hover {
        background: rgba(72, 187, 120, 0.2);
        transform: translateY(-2px);
      }

      @media (max-width: 768px) {
        .auth-card {
          padding: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas-bg"></canvas>
    <div class="bg-overlay"></div>

    <!-- <nav class="navbar" style="z-index: -1;">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <i class="fas fa-microchip logo-icon"></i>
            <span class="logo-text">WAR·SIM</span>
        </a>
    </div>
</nav> -->

    <div class="auth-container" style="height: 100vh">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to continue your war simulation</p>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label>Email Address</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="hello@example.com"
              required
            />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="checkbox-group">
            <label> <input type="checkbox" /> Remember me </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
          <button type="submit" class="auth-btn" href="Dashboard.html">
            Sign In →
          </button>
        </form>

        <div class="social-login">
          <p>Or continue with</p>
          <div class="social-icons">
            <div class="social-icon"><i class="fab fa-google"></i></div>
            <div class="social-icon"><i class="fab fa-github"></i></div>
            <div class="social-icon"><i class="fab fa-linkedin-in"></i></div>
          </div>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="signup2.html">Create Account</a>
        </div>
      </div>
    </div>

    <script>
      const BASE_URL = "http://127.0.0.1:8000";
      const canvas = document.getElementById("canvas-bg");
      const ctx = canvas.getContext("2d");
      let width, height;
      let particles = [];

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initParticles();
      }

      function initParticles() {
        particles = [];
        let count = Math.min(100, Math.floor((width * height) / 9000));
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.15,
            size: Math.random() * 2 + 1,
            color: `hsl(${140 + Math.random() * 40}, 70%, 55%)`, // ✅ FIXED BACKTICKS
          });
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);

        for (let p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -20) p.x = width + 20;
          if (p.x > width + 20) p.x = -20;
          if (p.y < -20) p.y = height + 20;
          if (p.y > height + 20) p.y = -20;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }

        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      resize();
      animate();

      // 🔥 UPDATED LOGIN (CONNECTED TO BACKEND)
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;

          if (!email || !password) {
            alert("Please enter valid credentials");
            return;
          }

          // 🔥 Match backend ID logic
          const userId = email.split("@")[0] + "_" + password;

          try {
            const response = await fetch(`${BASE_URL}/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                id: userId,
                Password: password,
              }),
            });

            const data = await response.json();

            if (response.ok) {
              // ✅ store user
              localStorage.setItem(
                "currentUser",
                JSON.stringify({
                  email: email,
                  id: userId,
                }),
              );

              // ✅ redirect (FIXED ROUTE)
              window.location.href = "/Dashboard_page";
            } else {
              alert(data.detail || "Login failed");
            }
          } catch (error) {
            console.error(error);
            alert("Server error");
          }
        });
    </script>
  </body>
</html>
